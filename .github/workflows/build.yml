name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          # Pin to the minimum supported Node (see package.json "engines").
          # jsdom (via isomorphic-dompurify) requires >=20.19, so testing on the
          # floor ensures CI catches incompatibilities instead of masking them.
          node-version: 20.19.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          # Pin to the minimum supported Node (see package.json "engines").
          # jsdom (via isomorphic-dompurify) requires >=20.19, so testing on the
          # floor ensures CI catches incompatibilities instead of masking them.
          node-version: 20.19.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
